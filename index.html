<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>凝聚｜首次體驗預約</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body { 
      margin: 0; font-family: system-ui, -apple-system, sans-serif; 
      background: #f8fafc; height: 100vh; overflow: hidden; 
    }
    
    /* 滿版提示畫面 (處理中 / 成功) */
    .screen { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: #f8fafc; z-index: 50; 
      display: none; flex-direction: column; align-items: center; justify-content: center; 
      text-align: center; padding: 20px; box-sizing: border-box;
    }
    .screen.active { display: flex; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* 載入動畫 */
    .spinner { 
      width: 45px; height: 45px; border: 4px solid #e2e8f0; border-top: 4px solid #06c755; 
      border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; 
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .status-text { color: #64748b; font-size: 16px; font-weight: 500; }

    /* 成功圖示 */
    .success-icon { 
      width: 80px; height: 80px; background: #06c755; border-radius: 50%; 
      display: flex; align-items: center; justify-content: center; margin-bottom: 20px; 
      box-shadow: 0 10px 20px rgba(6,199,85,0.2); 
    }
    .success-icon svg { width: 40px; height: 40px; fill: white; }
    h1 { font-size: 22px; color: #1e293b; margin: 0 0 12px; }
    p { font-size: 15px; color: #64748b; margin: 0 0 32px; line-height: 1.6; }

    /* 表單 Iframe */
    #filloutFrame { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      border: none; background: #fff; z-index: 10; display: none; 
    }
    #filloutFrame.active { display: block; }
  </style>
</head>
<body>

  <div id="loadingScreen" class="screen active">
    <div class="spinner"></div>
    <div class="status-text" id="loadingMsg">系統連線中...</div>
  </div>

  <div id="successScreen" class="screen">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    </div>
    <h1>預約資料已送出！</h1>
    <p>請於聊天室確認您的預約明細<br>小編將盡快與您聯繫</p>
  </div>

  <iframe id="filloutFrame" title="預約表單"></iframe>

  <script>
    const LIFF_ID = "2001467446-KNVd49W2";
    const LINE_OA_ID = "@biu5388t"; 
    const FILL_OUT_BASE_URL = "https://cicostudio.fillout.com/t/s2Q1z59UH1us";

    // 切換畫面邏輯
    function switchScreen(screenId) {
      document.getElementById('loadingScreen').classList.remove('active');
      document.getElementById('successScreen').classList.remove('active');
      document.getElementById('filloutFrame').classList.remove('active');
      document.getElementById(screenId).classList.add('active');
    }

    // 更新 Loading 文字
    function setLoadingText(text) {
      document.getElementById('loadingMsg').innerText = text;
    }

    // 備案機制：外部瀏覽器無法發送時，轉跳進入 LINE 官方帳號對話框
    function fallbackToLineOA(messageText) {
      const encodedText = encodeURIComponent(messageText);
      window.location.replace(`https://line.me/R/oaMessage/${LINE_OA_ID}/?${encodedText}`);
    }

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });

        // 1. 抓取網址參數
        const params = new URLSearchParams(window.location.search);
        const action = params.get('action');

        // 如果未登入，強制要求登入 (確保能抓到身分或傳送訊息)
        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        /* ＝＝＝＝＝ 模式 A：學員點擊了送出按鈕 (發送訊息) ＝＝＝＝＝ */
        if (action === 'submit_done') {
          setLoadingText("正在拋轉預約資料至 LINE...");

          // 清洗與組合參數
          const data = {
              name: params.get('name') || "未提供",
              phone: params.get('phone') || "未提供",
              location: params.get('location') || "未指定",
              trainer: params.get('trainer') || "未指定",
              datetime: params.get('datetime') || "未指定",
              referer: params.get('referer') || "無",
              promocamp: params.get('promocamp') || "無"
          };

          const messageText = `【首次體驗預約資料】\n小編會盡快和您確認預約時段～\n\n．姓名： ${data.name}\n．電話： ${data.phone}\n．門市： ${data.location}\n．教練： ${data.trainer}\n．希望日期／時段： ${data.datetime}\n．介紹人： ${data.referer}\n．活動／優惠： ${data.promocamp}`;

          if (liff.isInClient()) {
              try {
                  // 在 LINE 內部，靜默發送訊息
                  await liff.sendMessages([{ type: 'text', text: messageText }]);
                  switchScreen('successScreen');
                  // 顯示成功畫面 2.5 秒後自動關閉，讓學員回到對話框
                  setTimeout(() => liff.closeWindow(), 2500);
              } catch (err) {
                  console.warn("sendMessages 失敗，啟動備案:", err);
                  fallbackToLineOA(messageText);
              }
          } else {
              // 外部瀏覽器點開，喚起 LINE App
              setLoadingText("正在為您開啟 LINE...");
              fallbackToLineOA(messageText);
          }
          return;
        }

        /* ＝＝＝＝＝ 模式 B：剛進來預約，沒有參數 (顯示 Fillout 表單) ＝＝＝＝＝ */
        const profile = await liff.getProfile();
        const url = new URL(FILL_OUT_BASE_URL);
        // 把 UserId 偷塞進 Fillout 網址，這樣表單可以紀錄是誰填的 (若 Fillout 有設隱藏欄位 userid)
        url.searchParams.set('userid', profile.userId); 
        
        const iframe = document.getElementById('filloutFrame');
        iframe.src = url.toString();
        
        // 等待 Iframe 載入完畢再切換，避免白畫面
        iframe.onload = () => {
           switchScreen('filloutFrame');
        };

      } catch (err) {
        console.error('LIFF 初始化失敗:', err);
        setLoadingText("系統連線異常，請重新操作。");
      }
    }

    // 啟動主程式
    main();
  </script>
</body>
</html>
