<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>凝聚｜體驗預約</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    /* 基礎重置，防止畫面滾動與彈性拉扯 (iOS 滑順關鍵) */
    body, html { 
      margin: 0; padding: 0; width: 100%; height: 100%; 
      font-family: system-ui, -apple-system, sans-serif; 
      background: #f8fafc; overflow: hidden; overscroll-behavior-y: none;
    }

    /* 頂層 Loading 遮罩 (預設顯示，直到初始化完成才淡出) */
    #loadingOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #f8fafc; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #loadingOverlay.hidden {
      opacity: 0; visibility: hidden;
    }

    /* 精緻的載入動畫 */
    .spinner { 
      width: 45px; height: 45px; border: 4px solid #e2e8f0; border-top: 4px solid #06c755; 
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; 
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-text { color: #475569; font-size: 15px; font-weight: 500; letter-spacing: 1px; }

    /* 主畫面容器 */
    #appContainer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; opacity: 0; transition: opacity 0.5s ease;
    }
    #appContainer.ready { opacity: 1; }

    /* 這裡放您的表單 Iframe，或者未來的自建 UI */
    #mainFrame {
      width: 100%; height: 100%; border: none; background: #fff;
    }
  </style>
</head>
<body>

  <div id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingMsg">凝聚預約系統載入中...</div>
  </div>

  <div id="appContainer">
    <iframe id="mainFrame" title="預約表單"></iframe>
  </div>

  <script>
    /***** 系統核心設定 *****/
    const LIFF_ID = "2001467446-KNVd49W2";
    // Fillout 基礎網址
    const FILL_OUT_BASE_URL = "https://cicostudio.fillout.com/t/s2Q1z59UH1us"; 
    /***********************/

    // 取得 DOM 元素
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingMsg = document.getElementById('loadingMsg');
    const appContainer = document.getElementById('appContainer');
    const mainFrame = document.getElementById('mainFrame');

    // 解除 Loading 遮罩
    function hideLoading() {
      appContainer.classList.add('ready');
      loadingOverlay.classList.add('hidden');
    }

    async function initApp() {
      try {
        // 1. 瞬間啟動 LIFF
        await liff.init({ liffId: LIFF_ID });

        // 2. 身份驗證攔截 (若未登入，立刻導向登入，完全不會閃爍)
        if (!liff.isLoggedIn()) {
          loadingMsg.innerText = "正在驗證您的 LINE 帳號...";
          liff.login({ redirectUri: window.location.href });
          return; // 暫停執行，等待跳轉回來
        }

        const profile = await liff.getProfile();

        // 3. 核心：解析目前的網址 (模擬點餐系統的 OMO 路由邏輯)
        // 假設顧客掃描的網址是: https://liff.line.me/ID/reserve/xitun?trainer=alex&source=qr
        const path = window.location.pathname; // 取得 "/reserve/xitun"
        const params = new URLSearchParams(window.location.search);
        
        const storeId = path.split('/').pop() || "預設門市"; // 抓出 "xitun"
        const trainer = params.get('trainer') || "";
        const source = params.get('source') || "online";

        // 4. 根據網址參數，動態組合出顧客專屬的表單 (或畫面)
        loadingMsg.innerText = "正在準備您的專屬預約頁...";
        
        const targetUrl = new URL(FILL_OUT_BASE_URL);
        targetUrl.searchParams.set('userid', profile.userId);
        targetUrl.searchParams.set('name', profile.displayName); // 偷塞 LINE 暱稱讓學員少填一格
        if (storeId !== "預設門市") targetUrl.searchParams.set('location', storeId);
        if (trainer) targetUrl.searchParams.set('trainer', trainer);
        if (source) targetUrl.searchParams.set('referer', source);

        // 5. 載入內容並監聽完成事件
        mainFrame.src = targetUrl.toString();
        
        mainFrame.onload = () => {
          // 完美時機：Iframe 內容已經畫好，此時才把 Loading 遮罩拿掉！
          // 這樣顧客完全看不到白畫面或載入過程，感覺就像 Native App。
          hideLoading();
        };

      } catch (error) {
        console.error("系統啟動失敗", error);
        loadingMsg.innerText = "系統連線異常，請重新整理頁面。";
        loadingMsg.style.color = "#ef4444"; // 變紅色提示
      }
    }

    // 程式進入點
    initApp();
  </script>
</body>
</html>
